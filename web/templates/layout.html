{{ define "layout" }}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .Title }}{{ .Title }} — {{ end }}notesview</title>
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCI+PGcgc3Ryb2tlPSIjMzM0MTU1IiBzdHJva2Utd2lkdGg9IjEwIiBzdHJva2UtbGluZWNhcD0icm91bmQiPjxsaW5lIHgxPSIxNSIgeTE9IjIwIiB4Mj0iODUiIHkyPSIyMCIvPjxsaW5lIHgxPSIxNSIgeTE9IjQwIiB4Mj0iODUiIHkyPSI0MCIvPjxsaW5lIHgxPSIxNSIgeTE9IjYwIiB4Mj0iODUiIHkyPSI2MCIvPjxsaW5lIHgxPSIxNSIgeTE9IjgwIiB4Mj0iODUiIHkyPSI4MCIvPjwvZz48L3N2Zz4=">
  <script>
    // Pre-paint: decide theme and sidebar state from localStorage before
    // first render so the user never sees a flash of the wrong theme.
    // `notesview.theme` = 'light' | 'dark'. Unset falls back to
    // prefers-color-scheme.
    try {
      var stored = localStorage.getItem('notesview.theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = stored === 'dark' || (!stored && prefersDark);
      if (isDark) document.documentElement.classList.add('dark');
      window.__notesviewTheme = isDark ? 'dark' : 'light';
      if (localStorage.getItem('notesview.sidebarOpen') === '1') {
        document.documentElement.classList.add('sidebar-open');
      }
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <link id="hljs-light" rel="stylesheet" href="/static/hljs-light.css">
  <link id="hljs-dark" rel="stylesheet" href="/static/hljs-dark.css">
  <script>
    // Disable the inactive hljs theme before any code block is rendered.
    try {
      var darkNow = window.__notesviewTheme === 'dark';
      var l = document.getElementById('hljs-light');
      var d = document.getElementById('hljs-dark');
      if (l) l.disabled = darkNow;
      if (d) d.disabled = !darkNow;
    } catch (e) {}
  </script>
</head>
<body data-note-path="{{ .NotePath }}" class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">
  <header id="topbar" class="fixed top-0 left-0 right-0 h-12 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 flex items-center px-3 gap-2 z-[100]">
    <button
      id="sidebar-toggle"
      type="button"
      aria-label="Toggle files index"
      aria-controls="sidebar"
      aria-expanded="false"
      class="bg-transparent border-0 cursor-pointer px-2 py-1.5 text-lg text-gray-500 dark:text-gray-400 rounded-md leading-none flex-shrink-0 hover:bg-gray-50 hover:text-gray-900 dark:hover:bg-gray-800 dark:hover:text-gray-100">&#9776;</button>
    <div class="flex-1 flex items-center justify-end gap-2 overflow-hidden">
      <button
        id="theme-toggle"
        type="button"
        aria-label="Toggle dark mode"
        aria-pressed="false"
        title="Toggle dark mode"
        class="bg-transparent border-0 cursor-pointer p-1.5 text-gray-500 dark:text-gray-400 rounded-md leading-none flex-shrink-0 hover:bg-gray-50 hover:text-gray-900 dark:hover:bg-gray-800 dark:hover:text-gray-100">
        <svg data-theme-icon="moon" class="block dark:hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg data-theme-icon="sun" class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <aside id="sidebar" class="fixed top-12 left-0 bottom-0 w-[320px] bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 overflow-y-auto">
    {{ template "sidebar_body" .Sidebar }}
  </aside>

  <main id="note-pane" class="fixed top-12 left-0 right-0 bottom-0 overflow-y-auto px-4 py-4 max-[480px]:px-2 max-[480px]:py-2 bg-gray-50 dark:bg-gray-950">
    {{ if .DirListing }}{{ template "dir_listing" .DirListing }}{{ else }}{{ template "note_pane_body" . }}{{ end }}
  </main>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
{{ end }}
