{{ define "content" }}
<main
  id="content"
  data-dir-path="{{ .DirPath }}"
  class="mt-12 px-6 py-8 max-w-[900px] mx-auto min-h-[calc(100vh-3rem)] max-md:px-4 max-md:py-5 max-[480px]:px-3 max-[480px]:py-4">
  <div class="border border-gray-200 rounded-md overflow-hidden mb-4">
    <h2 class="bg-gray-50 px-4 py-2 text-base font-semibold text-gray-900 border-b border-gray-200 m-0">{{ if .DirPath }}{{ .DirPath }}{{ else }}Root{{ end }}</h2>
    {{ if .Entries }}
    <ul class="list-none m-0 p-0">
      {{ range .Entries }}
      {{ if .IsDir }}
      <li class="border-b border-gray-100 last:border-b-0"><a class="flex items-center gap-2 px-4 py-2 text-sm text-blue-600 font-medium no-underline transition-colors duration-100 hover:bg-gray-50" href="/browse/{{ .Path }}">&#128193; {{ .Name }}</a></li>
      {{ else }}
      <li class="border-b border-gray-100 last:border-b-0"><a class="flex items-center gap-2 px-4 py-2 text-sm text-blue-600 no-underline transition-colors duration-100 hover:bg-gray-50" href="/view/{{ .Path }}">&#128196; {{ .Name }}</a></li>
      {{ end }}
      {{ end }}
    </ul>
    {{ else }}
    <p class="px-4 py-6 text-gray-500 text-center">No files here.</p>
    {{ end }}
  </div>
</main>
{{ end }}
