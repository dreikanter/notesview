{{ define "sidebar_tree" }}
<script type="application/json" id="tv-initial">{{ .InitialJSON }}</script>
<nav class="py-3 space-y-4" aria-label="Browse">
  <section id="quick-links-section" class="px-3">
    <h2 class="pb-2 text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Browse</h2>
    <div class="grid grid-cols-3 gap-2">
      <a href="/tags" data-action="selectIndex" data-entry-href="/tags" class="rounded-md border border-gray-200 dark:border-gray-800 px-2 py-2 text-center text-xs font-medium text-blue-600 dark:text-blue-400 no-underline hover:border-blue-300 dark:hover:border-blue-600">Tags</a>
      <a href="/types" data-action="selectIndex" data-entry-href="/types" class="rounded-md border border-gray-200 dark:border-gray-800 px-2 py-2 text-center text-xs font-medium text-blue-600 dark:text-blue-400 no-underline hover:border-blue-300 dark:hover:border-blue-600">Types</a>
      <a href="/dates" data-action="selectIndex" data-entry-href="/dates" class="rounded-md border border-gray-200 dark:border-gray-800 px-2 py-2 text-center text-xs font-medium text-blue-600 dark:text-blue-400 no-underline hover:border-blue-300 dark:hover:border-blue-600">Dates</a>
    </div>
  </section>

  <section id="recent-section">
    <h2 class="px-3 pb-2 text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Recent notes</h2>
    <div class="border-y border-gray-200 dark:border-gray-800">
      {{ with .RecentNotes }}{{ template "entry_list" . }}{{ end }}
    </div>
  </section>

  <section id="filter-section" class="space-y-3">
    <div>
      <h2 class="px-3 pb-2 text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Tags</h2>
      <div id="tags-content" class="border-y border-gray-200 dark:border-gray-800">{{ with .Tags }}{{ template "entry_list" . }}{{ end }}</div>
    </div>
    <div>
      <h2 class="px-3 pb-2 text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Types</h2>
      <div id="types-content" class="border-y border-gray-200 dark:border-gray-800">{{ with .Types }}{{ template "entry_list" . }}{{ end }}</div>
    </div>
  </section>
</nav>
{{ end }}
