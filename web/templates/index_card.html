{{ define "index_card" }}
<aside class="index-card w-[320px] flex-shrink-0 border border-gray-200 rounded-md bg-white overflow-hidden self-start max-h-[calc(100vh-5rem)] flex flex-col">
  <header class="bg-gray-50 px-4 py-2 border-b border-gray-200 flex items-center">
    {{ if eq .Mode "dir" }}
    {{ template "breadcrumbs" .Breadcrumbs }}
    {{ end }}
  </header>
  {{ if .Entries }}
  <ul class="list-none m-0 p-0 overflow-y-auto">
    {{ range .Entries }}
    {{ if .IsDir }}
    <li class="border-b border-gray-100 last:border-b-0"><a class="flex items-center gap-2 px-4 py-2 text-sm text-blue-600 font-medium no-underline transition-colors duration-100 hover:bg-gray-50" href="{{ .Href }}">&#128193; {{ .Name }}</a></li>
    {{ else }}
    <li class="border-b border-gray-100 last:border-b-0"><a class="flex items-center gap-2 px-4 py-2 text-sm text-blue-600 no-underline transition-colors duration-100 hover:bg-gray-50" href="{{ .Href }}">&#128196; {{ .Name }}</a></li>
    {{ end }}
    {{ end }}
  </ul>
  {{ else }}
  <p class="px-4 py-6 text-gray-500 text-center">{{ .Empty }}</p>
  {{ end }}
</aside>
{{ end }}
