{{ define "breadcrumbs" }}<nav class="flex-1 flex items-center gap-1.5 text-sm text-gray-500 overflow-hidden whitespace-nowrap">
  <span class="inline-flex rounded-md border border-gray-300 overflow-hidden flex-shrink-0">
    <button type="button"
       onclick="switchToFiles()"
       class="px-1.5 py-0.5 text-xs font-medium transition-colors {{ if eq .Mode "dir" }}bg-gray-700 text-white{{ else }}text-gray-500 hover:bg-gray-100{{ end }}"
       aria-label="Browse files"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg></button>
    <button type="button"
       onclick="switchToTags()"
       class="px-1.5 py-0.5 text-xs font-medium border-l border-gray-300 transition-colors {{ if or (eq .Mode "tags") (eq .Mode "tag") }}bg-gray-700 text-white{{ else }}text-gray-500 hover:bg-gray-100{{ end }}"
       aria-label="Browse tags"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg></button>
  </span>
  {{ range .Crumbs }}
  <span class="text-gray-400 select-none">/</span>
  {{ if .Current }}
  <span aria-current="page" class="text-gray-900 overflow-hidden text-ellipsis">{{ .Label }}</span>
  {{ else }}
  <a class="text-blue-600 no-underline hover:underline" href="{{ .Href }}" hx-get="{{ .Href }}" hx-target="#sidebar" hx-swap="innerHTML" onclick="setSidebarDir('{{ .Href }}')">{{ .Label }}</a>
  {{ end }}
  {{ end }}
</nav>{{ end }}
